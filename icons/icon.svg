<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Cream background -->
  <rect width="512" height="512" fill="#f6f0e8"/>

  <!-- Terracotta square (like the building facade block) -->
  <rect x="56" y="56" width="400" height="400" fill="#b8684a"/>

  <!-- Lattice / brise-soleil grid pattern (evokes the building facade) -->
  <g fill="#a05a3e" opacity="0.55">
    <!-- 5 columns x 6 rows of recessed slots -->
    <rect x="88"  y="88"  width="44" height="64" rx="4"/>
    <rect x="152" y="88"  width="44" height="64" rx="4"/>
    <rect x="216" y="88"  width="44" height="64" rx="4"/>
    <rect x="280" y="88"  width="44" height="64" rx="4"/>
    <rect x="344" y="88"  width="44" height="64" rx="4"/>

    <rect x="88"  y="168" width="44" height="64" rx="4"/>
    <rect x="152" y="168" width="44" height="64" rx="4"/>
    <rect x="216" y="168" width="44" height="64" rx="4"/>
    <rect x="280" y="168" width="44" height="64" rx="4"/>
    <rect x="344" y="168" width="44" height="64" rx="4"/>
  </g>

  <!-- White frosted band -->
  <rect x="56" y="286" width="400" height="170" fill="#1b2b38"/>

  <!-- "THE CLAY HOUSE" wordmark -->
  <text x="256" y="352" font-family="Georgia, 'Times New Roman', serif"
    font-size="52" font-weight="400" fill="white"
    text-anchor="middle" letter-spacing="2">THE CLAY</text>
  <text x="256" y="414" font-family="Georgia, 'Times New Roman', serif"
    font-size="52" font-weight="400" fill="white"
    text-anchor="middle" letter-spacing="2">HOUSE</text>
  <text x="256" y="444" font-family="Arial, sans-serif"
    font-size="22" font-weight="400" fill="rgba(255,255,255,0.45)"
    text-anchor="middle" letter-spacing="8">CEPAKA</text>
</svg>
