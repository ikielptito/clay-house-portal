<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Clay House · Construction Progress</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1b2b38">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Clay House">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:         #1b2b38;
      --navy-mid:     #233445;
      --terra:        #b8684a;
      --terra-light:  #d4927a;
      --cream:        #f6f0e8;
      --warm-white:   #fdfaf6;
      --blush:        #ede4d9;
      --border:       #e2d8ce;
      --text:         #2a3540;
      --text-mid:     #5e707c;
      --text-light:   #96a8b4;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Jost', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
      font-weight: 300;
    }

    /* ─── HEADER ─────────────────────────────────────── */
    header {
      background: var(--navy);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: 1140px;
      margin: 0 auto;
      padding: 0 2rem;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 1.1rem;
    }

    .logo-mark {
      width: 44px;
      height: 44px;
      background: var(--terra);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1px;
    }

    .logo-mark span {
      display: block;
      font-family: 'Jost', sans-serif;
      font-size: 7.5px;
      font-weight: 600;
      color: white;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .logo-text h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: 1.35rem;
      color: white;
      letter-spacing: 0.08em;
    }

    .logo-text p {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.42);
      margin-top: 1px;
    }

    .header-badge {
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--terra-light);
      border: 1px solid rgba(184,104,74,0.4);
      padding: 0.35rem 0.75rem;
      border-radius: 2px;
    }

    /* ─── HERO STRIP ──────────────────────────────────── */
    .hero {
      background: var(--navy-mid);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .hero-inner {
      max-width: 1140px;
      margin: 0 auto;
      padding: 2.4rem 2rem;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 2rem;
    }

    .hero-period {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.8rem;
      font-weight: 300;
      color: white;
      letter-spacing: 0.03em;
      line-height: 1;
    }

    .hero-period span {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      color: var(--terra-light);
    }

    .hero-meta {
      display: flex;
      gap: 3rem;
    }

    .hero-stat {
      text-align: right;
    }

    .hero-stat-label {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.38);
      margin-bottom: 0.3rem;
    }

    .hero-stat-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      color: white;
      font-weight: 400;
    }

    .hero-stat-value.accent { color: var(--terra-light); }

    /* ─── MAIN ────────────────────────────────────────── */
    main {
      max-width: 1140px;
      margin: 0 auto;
      padding: 2.5rem 2rem 4rem;
    }

    /* ─── LOADING ─────────────────────────────────────── */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8rem 2rem;
      color: var(--text-light);
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      gap: 1.5rem;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 2px solid var(--border);
      border-top-color: var(--terra);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── TWO-COL LAYOUT ──────────────────────────────── */
    .report-grid {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 1.5rem;
      align-items: start;
    }

    .report-main { }
    .report-sidebar { }

    /* ─── CARD ────────────────────────────────────────── */
    .card {
      background: var(--warm-white);
      border: 1px solid var(--border);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 1.5rem;
    }

    .card-head {
      background: var(--navy);
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .card-head-title {
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
      font-weight: 400;
    }

    .card-head-dot {
      width: 5px;
      height: 5px;
      background: var(--terra);
      border-radius: 50%;
      flex-shrink: 0;
    }

    .card-body { padding: 1.5rem; }

    /* ─── GENERAL COMMENTS ────────────────────────────── */
    .narrative {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      line-height: 1.9;
      color: var(--text);
      font-weight: 400;
      margin-bottom: 1.2rem;
    }

    .detail-block { margin-top: 1.3rem; }

    .detail-block-title {
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--terra);
      font-weight: 500;
      margin-bottom: 0.65rem;
    }

    .detail-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .detail-list li {
      font-size: 0.82rem;
      line-height: 1.65;
      color: var(--text-mid);
      padding-left: 1.1rem;
      position: relative;
    }

    .detail-list li::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0.55em;
      width: 4px;
      height: 4px;
      background: var(--terra-light);
      border-radius: 50%;
    }

    /* ─── WORK PACKAGES ───────────────────────────────── */
    .wp-table { width: 100%; border-collapse: collapse; }

    .wp-category {
      background: var(--blush);
      padding: 0.5rem 1.2rem;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--navy);
      font-weight: 600;
    }

    .wp-row {
      border-bottom: 1px solid #f0ebe3;
      animation: fadeUp 0.4s ease both;
    }

    .wp-row:last-child { border-bottom: none; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .wp-row td {
      padding: 0.65rem 1.2rem;
      font-size: 0.8rem;
      color: var(--text-mid);
      vertical-align: middle;
    }

    .wp-row td:first-child { width: 46%; }
    .wp-row td:last-child  { width: 54%; }

    .wp-bar-wrap {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .wp-bar-track {
      flex: 1;
      height: 5px;
      background: var(--blush);
      border-radius: 99px;
      overflow: hidden;
    }

    .wp-bar-fill {
      height: 100%;
      border-radius: 99px;
      background: var(--terra);
      transition: width 1.2s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .wp-bar-fill.done { background: var(--navy); }

    .wp-pct {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text);
      min-width: 32px;
      text-align: right;
    }

    /* ─── PHOTOS ──────────────────────────────────────── */
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 0.75rem;
    }

    .photo-tile {
      aspect-ratio: 4 / 3;
      overflow: hidden;
      background: var(--blush);
      border-radius: 2px;
      cursor: zoom-in;
    }

    .photo-tile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .photo-tile:hover img { transform: scale(1.05); }

    /* Lightbox */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(20,30,38,0.94);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }

    .lightbox.open { opacity: 1; pointer-events: all; }

    .lightbox img {
      max-width: 90vw;
      max-height: 88vh;
      object-fit: contain;
      border-radius: 2px;
    }

    .lightbox-close {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      color: rgba(255,255,255,0.6);
      font-size: 1.5rem;
      cursor: pointer;
      line-height: 1;
      padding: 0.5rem;
    }

    /* ─── SIDEBAR ─────────────────────────────────────── */
    .dual-ring-wrap {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      padding: 1.75rem 1.5rem;
    }

    .ring-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .ring-svg { display: block; }

    .ring-label {
      font-size: 0.6rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-light);
      text-align: center;
    }

    .ring-sublabel {
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-light);
      opacity: 0.65;
      text-align: center;
      margin-top: -0.3rem;
    }

    .ring-pct {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.9rem;
      color: var(--navy);
      font-weight: 300;
      line-height: 1;
    }

    /* Past reports */
    .past-item {
      padding: 0.9rem 1.2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: background 0.2s;
    }

    .past-item:last-child { border-bottom: none; }
    .past-item:hover { background: var(--blush); }

    .past-period { font-size: 0.82rem; color: var(--text); }

    .past-arrow {
      font-size: 0.75rem;
      color: var(--text-light);
      transition: color 0.2s, transform 0.2s;
    }

    .past-item:hover .past-arrow { color: var(--terra); transform: translateX(2px); }

    /* ─── EMPTY STATE ─────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 8rem 2rem;
    }

    .empty-state h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 300;
      color: var(--navy);
      margin-bottom: 0.75rem;
    }

    .empty-state p {
      font-size: 0.82rem;
      color: var(--text-light);
    }

    /* ─── MILESTONE TRACKER ──────────────────────────── */
    .milestone-list {
      padding: 1.2rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .milestone-row {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      position: relative;
    }

    .milestone-spine {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
      width: 18px;
    }

    .milestone-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: white;
      flex-shrink: 0;
      margin-top: 2px;
      transition: all 0.3s;
    }

    .milestone-dot.complete { background: var(--navy); border-color: var(--navy); }
    .milestone-dot.active   { background: var(--terra); border-color: var(--terra); }

    .milestone-line {
      width: 2px;
      flex: 1;
      min-height: 28px;
      background: var(--border);
      margin: 3px 0;
    }

    .milestone-line.complete { background: var(--navy); }

    .milestone-row:last-child .milestone-line { display: none; }

    .milestone-content {
      flex: 1;
      padding-bottom: 1.1rem;
    }

    .milestone-row:last-child .milestone-content { padding-bottom: 0; }

    .milestone-name {
      font-size: 0.8rem;
      color: var(--text);
      font-weight: 400;
      line-height: 1.2;
    }

    .milestone-name.dim { color: var(--text-light); font-weight: 300; }

    .milestone-tag {
      display: inline-block;
      margin-top: 0.2rem;
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 500;
      padding: 0.15rem 0.45rem;
      border-radius: 2px;
    }

    .milestone-tag.complete  { background: #e8f0f8; color: var(--navy); }
    .milestone-tag.active    { background: #fdf0eb; color: var(--terra); }
    .milestone-tag.upcoming  { background: var(--blush); color: var(--text-light); }

    /* ─── TREND CHART ─────────────────────────────────── */
    .chart-wrap {
      padding: 1rem 1.2rem 0.5rem;
    }

    .chart-legend {
      display: flex;
      gap: 1.2rem;
      margin-bottom: 0.75rem;
    }

    .chart-legend-item {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-mid);
    }

    .chart-legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .chart-svg { width: 100%; display: block; overflow: visible; }

    /* ─── FOOTER ──────────────────────────────────────── */
    footer {
      background: var(--navy);
      color: rgba(255,255,255,0.25);
      text-align: center;
      padding: 1.5rem;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* ─── RESPONSIVE ──────────────────────────────────── */
    @media (max-width: 840px) {
      .report-grid { grid-template-columns: 1fr; }
      .hero-period { font-size: 2rem; }
      .hero-meta { gap: 1.5rem; }
    }

    @media (max-width: 540px) {
      .hero-inner { flex-direction: column; align-items: flex-start; }
      .hero-meta { flex-direction: row; gap: 2rem; }
      .hero-stat { text-align: left; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-mark">
        <span>THE</span><span>CLAY</span><span>HOUSE</span>
      </div>
      <div class="logo-text">
        <h1>The Clay House</h1>
        <p>Cepaka · Bali, Indonesia</p>
      </div>
    </div>
    <div class="header-badge">Construction Progress</div>
  </div>
</header>

<div class="hero" id="hero" style="display:none">
  <div class="hero-inner">
    <div class="hero-period" id="hero-period"></div>
    <div class="hero-meta">
      <div class="hero-stat">
        <div class="hero-stat-label">Construction</div>
        <div class="hero-stat-value" id="hero-construction-pct">—</div>
      </div>
      <div class="hero-stat">
        <div class="hero-stat-label">Overall</div>
        <div class="hero-stat-value" id="hero-pct">—</div>
      </div>
      <div class="hero-stat">
        <div class="hero-stat-label">Est. Completion</div>
        <div class="hero-stat-value accent" id="hero-completion">—</div>
      </div>
    </div>
  </div>
</div>

<main>
  <div id="content">
    <div class="loading-state">
      <div class="spinner"></div>
      Loading progress report
    </div>
  </div>
</main>

<footer>
  The Clay House Cepaka &nbsp;·&nbsp; Construction Progress Portal &nbsp;·&nbsp; Confidential to Unit Holders
</footer>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <div class="lightbox-close" onclick="closeLightbox()">✕</div>
  <img id="lightbox-img" src="" alt="">
</div>

<script>
  const WORK_PACKAGES = [
    { category: 'Foundation',           items: ['Preparation', 'Soil Work', 'Stonework'] },
    { category: 'Structure',            items: ['Concrete Work Structure', 'Pool Structure', 'Ground Tank & Deep-well'] },
    { category: 'Finishing',            items: ['Wall Finishing', 'Floor Finishing', 'Door & Window Installation', 'Plumbing Installation', 'Sanitary Installation', 'Electrical Work'] },
    { category: 'Furnishing & Fit-Out', items: ['Fit-Out', 'Furnishing'] }
  ];

  const MILESTONES = [
    { label: 'Foundation',        items: ['Preparation', 'Soil Work', 'Stonework'] },
    { label: 'Structure',         items: ['Concrete Work Structure', 'Pool Structure', 'Ground Tank & Deep-well'] },
    { label: 'Finishing',         items: ['Wall Finishing', 'Floor Finishing', 'Door & Window Installation', 'Plumbing Installation', 'Sanitary Installation', 'Electrical Work'] },
    { label: 'Fit-Out & Furnishing', items: ['Fit-Out', 'Furnishing'] },
    { label: 'Handover',          items: [] }  // complete when all above are complete
  ];

  function driveUrl(url) {
    if (!url) return url;
    const m = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
    if (m) return `https://drive.google.com/thumbnail?id=${m[1]}&sz=w800`;
    return url;
  }

  function getPct(wp, item) {
    if (!wp) return 0;
    return parseInt(wp[item] ?? 0) || 0;
  }

  const CONSTRUCTION_CATEGORIES = ['Foundation', 'Structure', 'Finishing'];

  // ─── Milestone tracker ────────────────────────────────────────────────────
  function buildMilestones(wp) {
    const statuses = MILESTONES.map((m, i) => {
      if (m.items.length === 0) {
        // Handover: complete only if all other milestones are complete
        const allDone = MILESTONES.slice(0, -1).every(prev =>
          prev.items.every(item => getPct(wp, item) === 100)
        );
        return allDone ? 'complete' : 'upcoming';
      }
      const avg = Math.round(m.items.reduce((s, item) => s + getPct(wp, item), 0) / m.items.length);
      if (avg === 100) return 'complete';
      if (avg > 0)    return 'active';
      return 'upcoming';
    });

    const rows = MILESTONES.map((m, i) => {
      const s = statuses[i];
      const tagText  = s === 'complete' ? 'Complete' : s === 'active' ? 'In Progress' : 'Upcoming';
      const lineClass = statuses[i] === 'complete' ? 'complete' : '';
      return `
        <div class="milestone-row">
          <div class="milestone-spine">
            <div class="milestone-dot ${s}"></div>
            <div class="milestone-line ${lineClass}"></div>
          </div>
          <div class="milestone-content">
            <div class="milestone-name ${s === 'upcoming' ? 'dim' : ''}">${m.label}</div>
            <span class="milestone-tag ${s}">${tagText}</span>
          </div>
        </div>`;
    }).join('');

    return `<div class="card">
      <div class="card-head"><div class="card-head-dot"></div><div class="card-head-title">Build Milestones</div></div>
      <div class="milestone-list">${rows}</div>
    </div>`;
  }

  // ─── Trend chart ─────────────────────────────────────────────────────────
  function shortPeriod(period) {
    // "19–25 May 2026" → "19 May"
    const parts = period.split(' ');
    if (parts.length >= 2) {
      const day = parts[0].split('–')[0].split('-')[0];
      return `${day} ${parts[1]}`;
    }
    return period.slice(0, 8);
  }

  function buildTrendChart(reports) {
    // reports: newest-first array of {id, period, cPct, oPct}
    // Take up to 8, reverse to oldest-first for left→right reading
    const data = reports
      .filter(r => r.cPct !== undefined && r.oPct !== undefined)
      .slice(0, 8)
      .reverse();

    if (data.length < 2) return '';

    const W = 280, H = 130;
    const mt = 10, mb = 38, ml = 28, mr = 10;
    const pw = W - ml - mr;
    const ph = H - mt - mb;

    const xOf = i => ml + (data.length > 1 ? i * pw / (data.length - 1) : pw / 2);
    const yOf = v => mt + ph - (v / 100) * ph;

    // Grid lines
    let gridLines = '';
    [25, 50, 75, 100].forEach(v => {
      const y = yOf(v);
      gridLines += `<line x1="${ml}" y1="${y}" x2="${W - mr}" y2="${y}"
        stroke="#ede4d9" stroke-width="1"/>
        <text x="${ml - 4}" y="${y + 4}" font-size="8" fill="#96a8b4"
          text-anchor="end">${v}</text>`;
    });

    // Polylines
    const cPoints = data.map((r, i) => `${xOf(i)},${yOf(r.cPct)}`).join(' ');
    const oPoints = data.map((r, i) => `${xOf(i)},${yOf(r.oPct)}`).join(' ');

    // Dots
    let dots = '';
    data.forEach((r, i) => {
      dots += `<circle cx="${xOf(i)}" cy="${yOf(r.cPct)}" r="3" fill="#1b2b38"/>`;
      dots += `<circle cx="${xOf(i)}" cy="${yOf(r.oPct)}" r="3" fill="#b8684a"/>`;
    });

    // X-axis labels
    let xLabels = '';
    data.forEach((r, i) => {
      xLabels += `<text x="${xOf(i)}" y="${H - 2}" font-size="8" fill="#96a8b4"
        text-anchor="middle" transform="rotate(-35 ${xOf(i)} ${H - 2})">${shortPeriod(r.period)}</text>`;
    });

    return `<div class="card">
      <div class="card-head"><div class="card-head-dot"></div><div class="card-head-title">Progress Over Time</div></div>
      <div class="chart-wrap">
        <div class="chart-legend">
          <span class="chart-legend-item"><span class="chart-legend-dot" style="background:var(--navy)"></span>Construction</span>
          <span class="chart-legend-item"><span class="chart-legend-dot" style="background:var(--terra)"></span>Overall</span>
        </div>
        <svg class="chart-svg" viewBox="0 0 ${W} ${H}">
          ${gridLines}
          <polyline points="${cPoints}" fill="none" stroke="#1b2b38" stroke-width="2" stroke-linejoin="round"/>
          <polyline points="${oPoints}" fill="none" stroke="#b8684a" stroke-width="2" stroke-linejoin="round"/>
          ${dots}
          ${xLabels}
        </svg>
      </div>
    </div>`;
  }

  function constructionPct(wp) {
    let sum = 0, n = 0;
    for (const cat of WORK_PACKAGES) {
      if (!CONSTRUCTION_CATEGORIES.includes(cat.category)) continue;
      for (const item of cat.items) { sum += getPct(wp, item); n++; }
    }
    return n ? Math.round(sum / n) : 0;
  }

  function overallPct(wp) {
    let sum = 0, n = 0;
    for (const cat of WORK_PACKAGES)
      for (const item of cat.items) { sum += getPct(wp, item); n++; }
    return n ? Math.round(sum / n) : 0;
  }

  function buildRing(pct, size = 108) {
    const r = size * 0.426, cx = size / 2, cy = size / 2;
    const circ = 2 * Math.PI * r;
    const fill = circ * (pct / 100);
    return `<svg class="ring-svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#ede4d9" stroke-width="6"/>
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#b8684a" stroke-width="6"
        stroke-dasharray="${fill} ${circ}" stroke-dashoffset="${circ * 0.25}"
        stroke-linecap="round" transform="rotate(-90 ${cx} ${cy})"/>
    </svg>`;
  }

  function buildWorkPackages(wp) {
    let html = '<table class="wp-table"><tbody>';
    for (const cat of WORK_PACKAGES) {
      html += `<tr><td class="wp-category" colspan="2">${cat.category}</td></tr>`;
      cat.items.forEach((item, i) => {
        const pct = getPct(wp, item);
        const done = pct === 100;
        html += `<tr class="wp-row" style="animation-delay:${i * 0.04}s">
          <td>${item}</td>
          <td>
            <div class="wp-bar-wrap">
              <div class="wp-bar-track">
                <div class="wp-bar-fill ${done ? 'done' : ''}" style="width:0%" data-pct="${pct}"></div>
              </div>
              <span class="wp-pct">${pct}%</span>
            </div>
          </td>
        </tr>`;
      });
    }
    html += '</tbody></table>';
    return html;
  }

  function buildPhotos(photos) {
    if (!photos || !photos.length) return '';
    const tiles = photos.map(url => {
      const src = driveUrl(url);
      return `<div class="photo-tile" onclick="openLightbox('${src}')">
        <img src="${src}" loading="lazy" alt="Site photo" onerror="this.closest('.photo-tile').style.display='none'">
      </div>`;
    }).join('');
    return `<div class="card">
      <div class="card-head"><div class="card-head-dot"></div><div class="card-head-title">Site Photography</div></div>
      <div class="card-body"><div class="photo-grid">${tiles}</div></div>
    </div>`;
  }

  function buildComments(synthesized) {
    if (!synthesized) return '';
    let html = `<p class="narrative">${synthesized.generalComments || ''}</p>`;
    if (synthesized.sections) {
      for (const sec of synthesized.sections) {
        if (sec.bullets && sec.bullets.length) {
          html += `<div class="detail-block">
            <div class="detail-block-title">${sec.title}</div>
            <ul class="detail-list">${sec.bullets.map(b => `<li>${b}</li>`).join('')}</ul>
          </div>`;
        }
      }
    }
    return `<div class="card">
      <div class="card-head"><div class="card-head-dot"></div><div class="card-head-title">General Comments</div></div>
      <div class="card-body">${html}</div>
    </div>`;
  }

  function render(report) {
    const { period, estimatedCompletion, workPackages, photos, synthesized, generatedAt } = report;
    const cPct = constructionPct(workPackages);
    const oPct = overallPct(workPackages);

    // Hero — split on the last space so "19–25 May 2026" → ["19–25 May", "2026"]
    const lastSpace = period.lastIndexOf(' ');
    const heroMain = lastSpace > 0 ? period.slice(0, lastSpace) : period;
    const heroYear = lastSpace > 0 ? period.slice(lastSpace + 1) : '';
    document.getElementById('hero-period').innerHTML = `${heroMain} <span>${heroYear}</span>`;
    document.getElementById('hero-construction-pct').textContent = cPct + '%';
    document.getElementById('hero-pct').textContent = oPct + '%';
    document.getElementById('hero-completion').textContent = estimatedCompletion || '—';
    document.getElementById('hero').style.display = '';

    const sidebar = `
      <div class="card">
        <div class="card-head"><div class="card-head-dot"></div><div class="card-head-title">Project Completion</div></div>
        <div class="dual-ring-wrap">
          <div class="ring-item">
            ${buildRing(cPct, 90)}
            <div class="ring-pct">${cPct}%</div>
            <div class="ring-label">Construction</div>
            <div class="ring-sublabel">Excl. fit-out</div>
          </div>
          <div class="ring-item">
            ${buildRing(oPct, 90)}
            <div class="ring-pct">${oPct}%</div>
            <div class="ring-label">Overall</div>
            <div class="ring-sublabel">All packages</div>
          </div>
        </div>
      </div>
    `;

    document.getElementById('content').innerHTML = `
      <div class="report-grid">
        <div class="report-main">
          ${buildComments(synthesized)}
          ${buildMilestones(workPackages)}
          <div class="card">
            <div class="card-head"><div class="card-head-dot"></div><div class="card-head-title">Overview &amp; Status of Work-Packages</div></div>
            <div>${buildWorkPackages(workPackages)}</div>
          </div>
          ${buildPhotos(photos)}
        </div>
        <div class="report-sidebar">
          ${sidebar}
          <div id="trend-chart-slot"></div>
          <div class="card" id="past-reports-card" style="display:none">
            <div class="card-head"><div class="card-head-dot"></div><div class="card-head-title">Past Reports</div></div>
            <div id="past-reports-list"></div>
          </div>
        </div>
      </div>
    `;

    // Animate progress bars after render
    requestAnimationFrame(() => {
      document.querySelectorAll('.wp-bar-fill').forEach(el => {
        el.style.width = el.dataset.pct + '%';
      });
    });

    return report.id;
  }

  function openLightbox(src) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox').classList.add('open');
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.getElementById('lightbox-img').src = '';
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

  async function loadPastReports(currentId) {
    try {
      const res = await fetch('/api/reports');
      if (!res.ok) return;
      const all = await res.json();

      // Trend chart — uses all reports (including current)
      const chartSlot = document.getElementById('trend-chart-slot');
      if (chartSlot) {
        const chartHtml = buildTrendChart(all);
        if (chartHtml) chartSlot.innerHTML = chartHtml;
      }

      // Past reports list — excludes current
      const past = all.filter(r => r.id !== currentId);
      if (!past.length) return;

      const list = past.map(r => `
        <div class="past-item" onclick="loadReport('${r.id}')">
          <span class="past-period">${r.period}</span>
          <span class="past-arrow">→</span>
        </div>
      `).join('');

      document.getElementById('past-reports-list').innerHTML = list;
      document.getElementById('past-reports-card').style.display = '';
    } catch {}
  }

  async function loadReport(id) {
    document.getElementById('content').innerHTML = `<div class="loading-state"><div class="spinner"></div>Loading…</div>`;
    window.scrollTo({ top: 0, behavior: 'smooth' });
    try {
      const res = await fetch(`/api/reports?id=${id}`);
      const report = await res.json();
      if (report) {
        const currentId = render(report);
        loadPastReports(currentId);
      }
    } catch {
      document.getElementById('content').innerHTML = `<div class="empty-state"><h2>Unable to load report</h2><p>Please refresh the page.</p></div>`;
    }
  }

  async function init() {
    try {
      const res = await fetch('/api/reports?id=latest');
      if (!res.ok) throw new Error();
      const report = await res.json();
      if (!report) {
        document.getElementById('content').innerHTML = `
          <div class="empty-state">
            <h2>No reports published yet</h2>
            <p>Check back soon for the latest construction updates.</p>
          </div>`;
        return;
      }
      const currentId = render(report);
      loadPastReports(currentId);
    } catch {
      document.getElementById('content').innerHTML = `
        <div class="empty-state">
          <h2>Unable to load</h2>
          <p>Please try refreshing the page.</p>
        </div>`;
    }
  }

  init();

  // Register service worker for PWA / offline support
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
</script>

</body>
</html>
